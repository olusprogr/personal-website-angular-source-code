<div *ngIf="!this.isLoaded" class="loading-state">
  <div class="loading-spinner"></div>
  <p>Loading projects...</p>
</div>

<section id="projects" class="projects-section">
  <div class="projects-decor-1"></div>
  <div class="projects-decor-2"></div>
  <div class="projects-decor-3"></div>
  <div class="projects-inner">
    <div class="section-header reveal reveal-up" [class.revealed]="isSectionRevealed">
      <div>
        <div class="section-badge">Portfolio</div>
        <h1 class="section-title">My best Projects</h1>
        <div class="title-bar"></div>
      </div>
      <p class="section-desc">The following provided projects represent my knowledge and experience in programming.</p>
    </div>
    <div class="projects-grid">
      <div class="project-card reveal reveal-up" [class.revealed]="isSectionRevealed" *ngFor="let project of this.projectsArray; let i = index" [style.transition-delay.ms]="200 + i * 120">
        <div class="card-image-wrap">
          <img class="card-image" [src]="project.img" alt="content">
        </div>
        <div class="card-body">
          <span class="card-tag">{{project.subtitle}}</span>
          <h2 class="card-title">{{ project.title }}</h2>
          <p class="card-desc">{{ project.description }}</p>
          <button class="card-btn" [routerLink]="['/home/project', project.title]">
            See More
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
