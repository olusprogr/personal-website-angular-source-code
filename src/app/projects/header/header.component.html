
<header class="project-header">
  <div class="project-header-inner">
    <a class="header-brand">
      <div class="header-brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
        </svg>
      </div>
      <span class="header-title">{{ this.title || "No project selected. Navigate back to home to select a project." }}</span>
    </a>
    <nav class="header-nav">
      <a class="header-nav-link" (click)="navigateToHome()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
      </a>
    </nav>
  </div>
</header>
